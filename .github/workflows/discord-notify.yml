name: Discord Notify

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          payload=$(jq -n \
            --arg repository "$REPOSITORY" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT_NAME" \
            --arg ref "$REF_NAME" \
            '{content: "📢 Có hoạt động mới trên GitHub\nRepository: \($repository)\nNgười thực hiện: \($actor)\nSự kiện: \($event)\nNhánh: \($ref)"}')

          curl --fail-with-body \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"